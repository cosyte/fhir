name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Universal gates from the shared pipeline (typecheck, lint, format, test, coverage, build, attw,
  # dual ESM/CJS smoke, actionlint) on the standard Node matrix. The full test suite — including the
  # P11 fuzz, PHI-leak, and type-level tiers — runs here at the default iteration count and gates.
  # fhir ships a PHI scanner (scripts/phi-scan.ts), so the shared pipeline's optional PHI-scan step
  # is switched on.
  ci:
    uses: cosyte/.github/.github/workflows/ci.yml@main
    with:
      run-phi-scan: true

  # P11 fuzz tier at fuzz-scale (FHIR-P11): the JSON + XML adversarial harness (XXE, billion-laughs,
  # deep nesting, `_element` games, huge/scientific numbers, prototype-chain keys) run at a raised
  # iteration count, plus the PHI-leak sweep. The contract: adversarial input never crashes / hangs /
  # OOMs — always a typed error or a bounded rejection, and no value ever reaches a diagnostic.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Fuzz + PHI-leak tiers (raised iteration count)
        env:
          FUZZ_RUNS: "20000"
        run: pnpm vitest run test/fuzz.test.ts test/phi-leak.test.ts

  # Differential vs the official validator (`org.hl7.fhir.core` / validator_cli.jar) — roadmap §6.
  # AUTHORED, NOT YET PROVEN: the oracle is a JVM program, so this gate can only run here (never in the
  # dev container). It runs over BOTH the synthetic spec-clean tier (P11) AND the Tier-2 real-world
  # quirk corpus (P10b, unblocked by ADR 0018 — grounded in FHIR published examples + public IG
  # samples, provenance in test/quirk-corpus.test.ts). A genuinely vendor-proprietary quirk absent from
  # every public sample stays grounded-only and is not in the corpus (inventing one is forbidden).
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (the differential harness imports the built package)
        run: pnpm build
      - name: Download validator_cli.jar (the differential oracle)
        run: |
          curl -fsSL -o "$RUNNER_TEMP/validator_cli.jar" \
            https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
      - name: Differential (synthetic spec-clean + Tier-2 quirk corpora)
        # ubuntu-latest ships a Temurin JDK; $JAVA_HOME_21_X64 is set by the runner image. The
        # differential harness invokes `java` from PATH — no unpinned setup-java action needed.
        env:
          VALIDATOR_CLI_JAR: ${{ runner.temp }}/validator_cli.jar
        run: |
          export PATH="${JAVA_HOME_21_X64:-$JAVA_HOME}/bin:$PATH"
          java -version
          node scripts/differential.mjs
